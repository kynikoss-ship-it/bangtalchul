<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과학 방탈출 게임: THE MYSTERY</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX (최신 버전으로 변경) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Material Symbols (Icon 대체) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <style>
    body { background-color: #000; margin: 0; color: #d1d5db; }
    .material-symbols-outlined { vertical-align: middle; }
    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [gameState, setGameState] = useState('playing'); 
      const [timeLeft, setTimeLeft] = useState(900);
      const [logs, setLogs] = useState(['[시스템] 버려진 연구실에 갇혔습니다. 단서를 찾아 탈출하십시오.']);
      const [inventory, setInventory] = useState([]);
      const [activeObject, setActiveObject] = useState(null);
      const [solved, setSolved] = useState({ desk: false, shelf: false, pc: false, generator: false });

      const logEndRef = useRef(null);

      const [p1Seq, setP1Seq] = useState('');
      const [p1V1, setP1V1] = useState('');
      const [p1V2, setP1V2] = useState('');
      
      const [p2K1, setP2K1] = useState('');
      const [p2K2, setP2K2] = useState('');
      const [p2K3, setP2K3] = useState('');
      
      const [p3F, setP3F] = useState('');
      const [p3A, setP3A] = useState('');
      
      const [p4K1, setP4K1] = useState('');
      const [p4K2, setP4K2] = useState('');
      const [p4K3, setP4K3] = useState('');

      const [finalKey, setFinalKey] = useState('');

      const [hintQuiz, setHintQuiz] = useState(null);
      const [hintInput, setHintInput] = useState('');
      const [unlockedHints, setUnlockedHints] = useState({ desk: false, shelf: false, pc: false, generator: false, door: false });

      const HINTS = {
        desk: "조작 변인과 통제 변인의 개념을 생각하십시오. 낙하 시간에 직접적인 변화를 주고자 한 요소와 일정하게 유지해야 하는 요소를 구별해야 합니다.",
        shelf: "에이크만이 각기병 치료의 원인으로 지목한 모이의 종류를 찾으십시오. 코페르니쿠스의 태양 중심설은 기존의 맹목적 믿음에서 벗어나 직접 확인하는 태도를 중시하게 했습니다.",
        pc: "첨단 기술 목록 중 19세기에 이미 발명되어 산업 현장에 도입된 동력 장치를 제외하십시오. 자율주행 5단계는 운전자의 개입이 '전혀 없는' 상태를 뜻하는 단어입니다.",
        generator: "해양 풍력이 육상보다 바람이 강해 얻는 이점과, 터빈 회전 시 발생하는 물리적 파장을 고려하십시오. 대기오염과 기후 변화를 일으키는 탄소 기반 연료의 총칭을 입력하십시오.",
        door: "현재 세대와 미래 세대 모두의 환경과 사회적 풍요를 유지하려는 삶의 태도를 지칭하는 5글자 용어입니다."
      };

      const SCIENCE_QUIZ_BANK = [
        { q: "물이 어는 온도는 섭씨 몇 도인가요? (숫자만 입력)", a: ["0", "영도", "0도"] },
        { q: "태양계에서 가장 큰 행성은 무엇인가요?", a: ["목성"] },
        { q: "곤충의 다리는 모두 몇 쌍인가요? (숫자만 입력)", a: ["3", "세"] },
        { q: "식물이 빛을 받아 스스로 양분을 만드는 과정을 무엇이라고 하나요?", a: ["광합성"] },
        { q: "자석의 N극과 N극을 가까이 하면 서로 어떻게 되나요?", a: ["밀어낸다", "밀어냄", "반발", "밀어내는"] },
        { q: "지구가 태양 주위를 한 바퀴 도는 데 걸리는 시간은 약 며칠인가요? (숫자만 입력)", a: ["365"] },
        { q: "개구리의 어릴 적 모습으로, 꼬리를 치며 물속을 헤엄치는 것은?", a: ["올챙이"] },
        { q: "빛의 3원색은 빨강, 초록, 그리고 어떤 색인가요?", a: ["파랑", "파란", "파란색", "청색"] }
      ];

      useEffect(() => {
        if (gameState !== 'playing') return;
        const timer = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              setGameState('failed');
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, [gameState]);

      useEffect(() => {
        // 옵셔널 체이닝 대신 논리 연산자 사용 (Babel 호환성)
        if (logEndRef.current) {
          logEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [logs]);

      const addLog = (msg) => {
        setLogs((prev) => [...prev, msg]);
      };

      const sanitize = (str) => str.replace(/\s/g, '');

      const checkAnswer = (input, keywords) => {
        const sanitizedInput = sanitize(input);
        if (!sanitizedInput) return false;
        return keywords.some(keyword => sanitizedInput.includes(keyword));
      };

      const requestHint = () => {
        const randomQuiz = SCIENCE_QUIZ_BANK[Math.floor(Math.random() * SCIENCE_QUIZ_BANK.length)];
        setHintQuiz(randomQuiz);
        setHintInput('');
      };

      const solveHint = () => {
        if (checkAnswer(hintInput, hintQuiz.a)) {
          setUnlockedHints(prev => ({ ...prev, [activeObject]: true }));
          setHintQuiz(null);
          addLog('보안 퀴즈를 통과하여 힌트가 개방되었습니다.');
        } else {
          setTimeLeft(prev => Math.max(0, prev - 30));
          addLog('보안 퀴즈 오답입니다. 페널티로 제한 시간이 30초 감소합니다.');
          setHintInput('');
        }
      };

      const renderHintSection = (objId) => {
        return (
          <div className="mt-4 border-t border-gray-700 pt-4">
            {unlockedHints[objId] ? (
              <div className="text-yellow-400 text-sm p-2 bg-yellow-900/30 border border-yellow-700/50 rounded">
                [힌트] {HINTS[objId]}
              </div>
            ) : hintQuiz ? (
              <div className="flex flex-col gap-2 text-sm text-gray-300">
                <span>보안 퀴즈: {hintQuiz.q}</span>
                <div className="flex items-center gap-2">
                  <input 
                    type="text" 
                    value={hintInput} 
                    onChange={e => setHintInput(e.target.value)} 
                    onKeyDown={e => e.key === 'Enter' && solveHint()}
                    className="w-full max-w-[150px] bg-black border border-gray-600 p-1 text-center outline-none focus:border-white rounded" 
                  />
                  <button onClick={solveHint} className="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded whitespace-nowrap">확인</button>
                  <button onClick={() => setHintQuiz(null)} className="text-gray-500 hover:text-gray-300 px-2 whitespace-nowrap">취소</button>
                </div>
              </div>
            ) : (
              <button onClick={requestHint} className="text-sm text-gray-500 hover:text-gray-300 underline">
                기초 과학 퀴즈를 풀고 힌트 보기
              </button>
            )}
          </div>
        );
      };

      const handleInteract = (obj) => {
        if (gameState !== 'playing') return;
        setActiveObject(obj);
        setHintQuiz(null);
        setHintInput('');
        
        switch(obj) {
          case 'desk': addLog('낡은 연구 책상을 조사합니다. 종이 헬리콥터 실험에 대한 찢어진 노트가 있습니다.'); break;
          case 'shelf': addLog('먼지가 쌓인 책장을 살핍니다. 에이크만과 코페르니쿠스에 관한 기록이 있습니다.'); break;
          case 'pc':
            if (!solved.desk || !solved.shelf) {
              addLog('메인 컴퓨터에 접근하려 했으나, 전원이 불안정하거나 인증 키가 부족합니다. 다른 단서를 먼저 찾아야 합니다.');
              setActiveObject(null);
            } else {
              addLog('메인 컴퓨터에 로그인했습니다. 기술 데이터망에 접근합니다.');
            }
            break;
          case 'generator': addLog('비상 발전기를 조사합니다. 해양 풍력 발전과 화석 연료에 대한 분석 패널이 있습니다.'); break;
          case 'door': addLog('굳게 닫힌 철문입니다. 메인 컴퓨터와 발전기 복구가 완료되어야 열 수 있을 것 같습니다.'); break;
          default: break;
        }
      };

      const checkDesk = () => {
        const isSeqCorrect = sanitize(p1Seq) === '나가다';
        const isV1Correct = checkAnswer(p1V1, ['길이', '날개길이']);
        const isV2Correct = checkAnswer(p1V2, ['너비', '꼬리', '클립', '나머지']);

        if (isSeqCorrect && isV1Correct && isV2Correct) {
          setSolved(p => ({ ...p, desk: true }));
          setInventory(p => {
            if (p.includes('탐구 기록 칩')) return p;
            return [...p, '탐구 기록 칩'];
          });
          addLog('노트의 내용을 논리적으로 완성했습니다. [탐구 기록 칩]을 획득했습니다.');
          setActiveObject(null);
        } else {
          addLog('단서의 논리적 순서나 변인 통제 조건이 틀렸습니다.');
        }
      };

      const checkShelf = () => {
        const isK1Correct = checkAnswer(p2K1, ['현미', '현미쌀']);
        const isK2Correct = checkAnswer(p2K2, ['각기병', '각기증세']);
        const isK3Correct = checkAnswer(p2K3, ['관찰', '경험', '관측', '실험']);

        if (isK1Correct && isK2Correct && isK3Correct) {
          setSolved(p => ({ ...p, shelf: true }));
          setInventory(p => {
            if (p.includes('과학사 인증 키')) return p;
            return [...p, '과학사 인증 키'];
          });
          addLog('과거의 과학적 발견 기록을 복원했습니다. [과학사 인증 키]를 획득했습니다.');
          setActiveObject(null);
        } else {
          addLog('가설의 핵심 키워드나 패러다임 변화 요인이 일치하지 않습니다.');
        }
      };

      const checkPC = () => {
        const isFCorrect = checkAnswer(p3F, ['2', '전동기']);
        const isACorrect = checkAnswer(p3A, ['완전', '완벽']);

        if (isFCorrect && isACorrect) {
          setSolved(p => ({ ...p, pc: true }));
          setInventory(p => {
            if (p.includes('보안 오버라이드 코드')) return p;
            return [...p, '보안 오버라이드 코드'];
          });
          addLog('첨단 기술 네트워크 오류를 수정했습니다. 문을 제어할 [보안 오버라이드 코드]를 획득했습니다.');
          setActiveObject(null);
        } else {
          addLog('기술 분류가 잘못되었거나 시스템 레벨 명세가 틀렸습니다.');
        }
      };

      const checkGenerator = () => {
        const isK1Correct = checkAnswer(p4K1, ['효율', '효율성', '에너지효율']);
        const isK2Correct = checkAnswer(p4K2, ['소음', '진동', '소리', '시끄러운']);
        const isK3Correct = checkAnswer(p4K3, ['화석연료', '석유', '석탄', '화석에너지']);

        if (isK1Correct && isK2Correct && isK3Correct) {
          setSolved(p => ({ ...p, generator: true }));
          addLog('발전기 시스템을 올바른 에너지 패러다임으로 재설정했습니다. 전력이 정상적으로 공급됩니다.');
          setActiveObject(null);
        } else {
          addLog('에너지 분석 데이터가 논리적이지 않아 발전기가 작동하지 않습니다.');
        }
      };

      const checkDoor = () => {
        if (!solved.pc || !solved.generator) {
          addLog('전력이 없거나 보안 코드가 없어 패널이 작동하지 않습니다.');
          return;
        }

        if (checkAnswer(finalKey, ['지속가능한삶', '지속가능발전', '지속가능성', '지속가능'])) {
          setGameState('escaped');
          addLog('연구실의 문이 열렸습니다. 탈출에 성공했습니다.');
        } else {
          addLog('최종 키워드가 일치하지 않아 문이 열리지 않습니다.');
        }
      };

      return (
        <div className="min-h-screen bg-black text-gray-300 font-sans p-4 flex flex-col items-center justify-center">
          <div className="w-full max-w-4xl flex justify-between items-center border-b border-gray-700 pb-2 mb-4">
            <h1 className="text-xl font-bold tracking-wider text-gray-100 flex items-center gap-2">
              <span className="material-symbols-outlined" style={{fontSize: '20px'}}>search</span> LAB_ESCAPE: THE MYSTERY
            </h1>
            <div className="flex items-center gap-2 text-lg">
              <span className={`material-symbols-outlined ${timeLeft < 60 ? "text-red-500 animate-pulse" : ""}`} style={{fontSize: '20px'}}>schedule</span>
              <span className={timeLeft < 60 ? "text-red-500 font-bold" : "font-mono"}>
                {Math.floor(timeLeft / 60).toString().padStart(2, '0')}:{(timeLeft % 60).toString().padStart(2, '0')}
              </span>
            </div>
          </div>

          <div className="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="md:col-span-2 bg-gray-900 border border-gray-700 relative h-96 rounded flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(50,50,50,0.4)_0%,rgba(0,0,0,0.8)_100%)] pointer-events-none"></div>
              
              <div className="relative w-full h-full flex flex-wrap content-between justify-between">
                <div className="w-full flex justify-between px-8 mt-8">
                  <button onClick={() => handleInteract('shelf')} className={`flex flex-col items-center group ${solved.shelf ? 'opacity-50' : ''}`}>
                    <div className="p-4 bg-gray-800 border border-gray-600 rounded group-hover:border-gray-400 group-hover:bg-gray-700 transition-all cursor-pointer shadow-lg">
                      <span className="material-symbols-outlined text-amber-700" style={{fontSize: '48px'}}>menu_book</span>
                    </div>
                    <span className="mt-2 text-xs font-bold bg-black/50 px-2 py-1">낡은 책장</span>
                  </button>
                  
                  <button onClick={() => handleInteract('door')} className="flex flex-col items-center group">
                    <div className="p-4 bg-gray-800 border border-gray-600 rounded group-hover:border-gray-400 group-hover:bg-gray-700 transition-all cursor-pointer shadow-lg relative">
                      {gameState === 'escaped' ? 
                        <span className="material-symbols-outlined text-green-500" style={{fontSize: '64px'}}>meeting_room</span> : 
                        <span className="material-symbols-outlined text-gray-500" style={{fontSize: '64px'}}>door_front</span>
                      }
                      {solved.pc && solved.generator && gameState !== 'escaped' && <div className="absolute top-2 right-2 w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>}
                    </div>
                    <span className="mt-2 text-xs font-bold bg-black/50 px-2 py-1">철문</span>
                  </button>
                </div>

                <div className="w-full flex justify-between px-4 mb-4">
                  <button onClick={() => handleInteract('desk')} className={`flex flex-col items-center group ${solved.desk ? 'opacity-50' : ''}`}>
                    <div className="p-4 bg-gray-800 border border-gray-600 rounded group-hover:border-gray-400 group-hover:bg-gray-700 transition-all cursor-pointer shadow-lg">
                      <span className="material-symbols-outlined text-gray-400" style={{fontSize: '48px'}}>description</span>
                    </div>
                    <span className="mt-2 text-xs font-bold bg-black/50 px-2 py-1">연구 책상</span>
                  </button>

                  <button onClick={() => handleInteract('pc')} className={`flex flex-col items-center group ${solved.pc ? 'opacity-50' : ''}`}>
                    <div className="p-4 bg-gray-800 border border-gray-600 rounded group-hover:border-blue-400 group-hover:bg-gray-700 transition-all cursor-pointer shadow-lg relative">
                      <span className={`material-symbols-outlined ${solved.desk && solved.shelf ? "text-blue-400" : "text-gray-600"}`} style={{fontSize: '48px'}}>desktop_windows</span>
                    </div>
                    <span className="mt-2 text-xs font-bold bg-black/50 px-2 py-1">메인 컴퓨터</span>
                  </button>

                  <button onClick={() => handleInteract('generator')} className={`flex flex-col items-center group ${solved.generator ? 'opacity-50' : ''}`}>
                    <div className="p-4 bg-gray-800 border border-gray-600 rounded group-hover:border-yellow-400 group-hover:bg-gray-700 transition-all cursor-pointer shadow-lg">
                      <span className={`material-symbols-outlined ${solved.generator ? "text-yellow-500" : "text-gray-600"}`} style={{fontSize: '48px'}}>bolt</span>
                    </div>
                    <span className="mt-2 text-xs font-bold bg-black/50 px-2 py-1">비상 발전기</span>
                  </button>
                </div>
              </div>
            </div>

            <div className="bg-gray-900 border border-gray-700 p-4 flex flex-col h-96 rounded">
              <h2 className="text-sm font-bold border-b border-gray-700 pb-2 mb-2">인벤토리</h2>
              <div className="flex-1 overflow-y-auto space-y-2">
                {inventory.length === 0 ? (
                  <p className="text-xs text-gray-500 italic text-center py-4">가진 것이 없다.</p>
                ) : (
                  inventory.map((item, idx) => (
                    <div key={idx} className="bg-gray-800 p-2 rounded text-sm flex items-center gap-2 border border-gray-600">
                      <span className="material-symbols-outlined text-gray-400" style={{fontSize: '14px'}}>key</span> {item}
                    </div>
                  ))
                )}
              </div>
              <div className="mt-4 pt-2 border-t border-gray-700">
                <h2 className="text-sm font-bold mb-2">진행 상태</h2>
                <div className="text-xs space-y-1 text-gray-400">
                  <p className="flex justify-between">전력 복구: {solved.generator ? <span className="text-green-400 font-bold">ON</span> : <span className="text-red-400">OFF</span>}</p>
                  <p className="flex justify-between">보안 인가: {solved.pc ? <span className="text-green-400 font-bold">승인</span> : <span className="text-red-400">미승인</span>}</p>
                </div>
              </div>
            </div>
          </div>

          <div className="w-full max-w-4xl mt-4 bg-gray-900 border border-gray-700 p-4 h-40 overflow-y-auto rounded font-mono text-sm leading-relaxed shadow-inner">
            {logs.map((log, idx) => <p key={idx} className="mb-1 text-gray-400 tracking-tight">{log}</p>)}
            <div ref={logEndRef} />
          </div>

          {gameState !== 'playing' && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
              <div className="bg-gray-900 p-8 border border-gray-700 text-center max-w-md rounded-lg shadow-2xl">
                <h2 className={`text-3xl font-bold mb-4 ${gameState === 'escaped' ? 'text-green-500' : 'text-red-500'}`}>
                  {gameState === 'escaped' ? 'ESCAPED' : 'GAME OVER'}
                </h2>
                <p className="mb-6 text-gray-400">
