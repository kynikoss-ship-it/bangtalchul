<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수증기량 계산 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        canvas { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; cursor: crosshair; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row">
        
        <!-- 좌측: 데이터 제공 영역 (표 & 그래프) -->
        <div class="w-full md:w-1/2 p-6 bg-slate-50 border-r border-gray-200 flex flex-col">
            <h2 class="text-xl font-bold mb-4 text-slate-800">참고 데이터</h2>
            
            <!-- 표 영역 -->
            <div class="overflow-x-auto mb-6">
                <table class="w-full text-sm text-center border-collapse border border-slate-300">
                    <thead>
                        <tr class="bg-slate-200">
                            <th class="border border-slate-300 p-2">기온 (℃)</th>
                            <th class="border border-slate-300 p-2">0</th>
                            <th class="border border-slate-300 p-2">5</th>
                            <th class="border border-slate-300 p-2">10</th>
                            <th class="border border-slate-300 p-2">15</th>
                            <th class="border border-slate-300 p-2">20</th>
                            <th class="border border-slate-300 p-2">25</th>
                            <th class="border border-slate-300 p-2">30</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th class="bg-slate-100 border border-slate-300 p-2">포화 수증기량<br>(g/kg)</th>
                            <td class="border border-slate-300 p-2">3.8</td>
                            <td class="border border-slate-300 p-2">5.4</td>
                            <td class="border border-slate-300 p-2">7.6</td>
                            <td class="border border-slate-300 p-2">10.6</td>
                            <td class="border border-slate-300 p-2">14.7</td>
                            <td class="border border-slate-300 p-2">20.0</td>
                            <td class="border border-slate-300 p-2">27.1</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 그래프 영역 -->
            <div class="flex-1 flex flex-col">
                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-md font-semibold text-slate-700">포화 수증기량 곡선</h3>
                    <p class="text-xs text-amber-600 font-medium">💡 그래프에 마우스를 올려 값을 확인하세요.</p>
                </div>
                <canvas id="vaporGraph" width="450" height="350" class="w-full h-auto"></canvas>
            </div>
        </div>

        <!-- 우측: 게임(퀴즈) 영역 -->
        <div class="w-full md:w-1/2 p-6 flex flex-col justify-center">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-blue-600">수증기량 탈출 게임</h1>
                <span id="stageIndicator" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full font-bold text-sm">Stage 1 / 5</span>
            </div>

            <div id="gameEndScreen" class="hidden text-center py-10">
                <h2 class="text-3xl font-bold text-green-600 mb-4">모든 스테이지 클리어!</h2>
                <p class="text-slate-600 mb-6">수증기량 계산 개념을 완벽하게 이해했습니다.</p>
                <button onclick="resetGame()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">처음부터 다시 하기</button>
            </div>

            <div id="quizArea" class="flex flex-col gap-4">
                <div class="bg-blue-50 p-5 rounded-lg border border-blue-100">
                    <p id="questionText" class="text-lg text-slate-800 font-medium leading-relaxed"></p>
                </div>

                <div class="flex gap-2 items-center">
                    <input type="number" id="answerInput" step="0.1" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="정답을 입력하세요 (숫자만)">
                    <button id="hintBtn" onclick="showHint()" class="px-4 py-3 bg-amber-500 text-white font-bold rounded-lg hover:bg-amber-600 transition">힌트</button>
                    <button id="submitBtn" onclick="checkAnswer()" class="px-6 py-3 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-700 transition">제출</button>
                </div>

                <div id="hintArea" class="hidden mt-2 p-4 bg-amber-50 border border-amber-200 text-amber-800 rounded-lg text-sm whitespace-pre-wrap leading-relaxed"></div>

                <div id="feedbackArea" class="hidden mt-4 p-4 rounded-lg">
                    <p id="feedbackTitle" class="font-bold text-lg mb-1"></p>
                    <p id="feedbackDesc" class="text-sm"></p>
                    <button id="nextBtn" onclick="nextQuestion()" class="mt-4 px-4 py-2 bg-white text-sm font-bold rounded border shadow-sm transition hidden">다음 문제로</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 제공된 데이터
        const vaporData = [
            { temp: 0, vapor: 3.8 }, { temp: 5, vapor: 5.4 }, { temp: 10, vapor: 7.6 },
            { temp: 15, vapor: 10.6 }, { temp: 20, vapor: 14.7 }, { temp: 25, vapor: 20.0 }, { temp: 30, vapor: 27.1 }
        ];

        let questions = [];
        let currentStage = 0;
        
        // 렌더링 및 애니메이션 상태
        let animationId = null;
        let showingFeedback = false;
        let animData = null;
        let animStartTime = null;
        const animDuration = 2500;

        // 인터랙션 상태
        let interactiveMode = true;
        let mousePos = null;

        // 랜덤 문제 생성 함수 (1kg 기준으로 고정)
        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateQuestions(count) {
            let generated = [];

            for (let i = 0; i < count; i++) {
                const type = Math.floor(Math.random() * 4);
                let qObj = {};

                if (type === 0) {
                    // 포화 수증기량 찾기
                    const tObj = getRandomItem(vaporData.slice(1));
                    const a = tObj.vapor;
                    qObj = {
                        q: `현재 기온이 ${tObj.temp}℃인 포화 상태의 공기 1kg에 들어 있는 수증기량을 구하시오. (단위: g)`,
                        hint: `그래프에서 가로축(기온) ${tObj.temp}℃에 해당하는 점을 찍어 수증기량을 확인하세요.`,
                        a: a,
                        exp: `${tObj.temp}℃의 포화 수증기량 곡선상의 값은 ${a}g/kg입니다. 공기가 1kg이므로 정답은 ${a}g입니다.`,
                        graph: { type: 'point', t: tObj.temp, v: tObj.vapor, label: `${tObj.temp}℃ 포화 상태` }
                    };
                } else if (type === 1) {
                    // 이슬점 찾기
                    const dewObj = getRandomItem(vaporData.slice(0, 5));
                    const currentTObj = getRandomItem(vaporData.filter(d => d.temp > dewObj.temp));
                    const a = dewObj.temp;
                    qObj = {
                        q: `현재 기온이 ${currentTObj.temp}℃인 공기 1kg에 ${dewObj.vapor}g의 수증기가 들어 있습니다. 이 공기의 이슬점을 구하시오. (단위: ℃)`,
                        hint: `현재 수증기량(${dewObj.vapor}g)을 유지한 채 온도를 낮췄을 때(왼쪽으로 이동), 포화 수증기량 곡선과 만나는 온도가 이슬점입니다.`,
                        a: a,
                        exp: `현재 수증기량이 ${dewObj.vapor}g/kg입니다. 포화 수증기량이 ${dewObj.vapor}g/kg이 되는 온도를 곡선에서 찾으면 ${a}℃입니다.`,
                        graph: { type: 'dewPoint', t1: currentTObj.temp, v: dewObj.vapor, t2: dewObj.temp }
                    };
                } else if (type === 2) {
                    // 응결량 찾기
                    const startObj = getRandomItem(vaporData.slice(3));
                    const endObj = getRandomItem(vaporData.filter(d => d.temp < startObj.temp));
                    
                    const currentVaporKg = parseFloat((endObj.vapor + Math.random() * (startObj.vapor - endObj.vapor)).toFixed(1));
                    const condKg = parseFloat((currentVaporKg - endObj.vapor).toFixed(1));
                    const a = condKg;

                    qObj = {
                        q: `현재 기온이 ${startObj.temp}℃인 공기 1kg에 ${currentVaporKg}g의 수증기가 들어 있습니다. 이 공기를 ${endObj.temp}℃로 냉각시켰을 때 응결량을 구하시오. (단위: g)`,
                        hint: `1. 그래프에 현재 공기의 상태(${startObj.temp}℃, ${currentVaporKg}g)를 찍어보세요.\n2. ${endObj.temp}℃로 온도를 낮출 때(왼쪽으로 이동) 곡선 밖으로 넘치는 양이 응결량입니다.\n3. (현재 수증기량) - (${endObj.temp}℃의 포화 수증기량)을 계산하세요.`,
                        a: a,
                        exp: `현재 수증기량은 ${currentVaporKg}g/kg입니다. ${endObj.temp}℃로 냉각 시 최대로 포함할 수 있는 포화 수증기량은 ${endObj.vapor}g/kg입니다. 1kg 공기이므로 ${currentVaporKg} - ${endObj.vapor} = ${a}g이 응결됩니다.`,
                        graph: { type: 'condensation', t_start: startObj.temp, v_start: currentVaporKg, t_end: endObj.temp, v_end: endObj.vapor }
                    };
                } else {
                    // 상대 습도 찾기
                    const tObj = getRandomItem(vaporData.slice(2));
                    const dewObj = getRandomItem(vaporData.filter(d => d.temp < tObj.temp));
                    const a = Math.round((dewObj.vapor / tObj.vapor) * 100);

                    qObj = {
                        q: `기온이 ${tObj.temp}℃이고, 이슬점이 ${dewObj.temp}℃인 공기의 상대 습도를 구하시오. (단위: %, 소수 첫째 자리에서 반올림)`,
                        hint: `이슬점이 ${dewObj.temp}℃라는 것은 현재 수증기량이 ${dewObj.temp}℃의 포화 수증기량과 같음을 뜻합니다.\n상대 습도 = (현재 수증기량 ÷ ${tObj.temp}℃ 포화 수증기량) × 100`,
                        a: a,
                        exp: `이슬점이 ${dewObj.temp}℃이므로 현재 수증기량은 ${dewObj.vapor}g/kg입니다. ${tObj.temp}℃의 포화 수증기량은 ${tObj.vapor}g/kg이므로 (${dewObj.vapor} / ${tObj.vapor}) × 100 ≒ ${a}% 입니다.`,
                        graph: { type: 'humidity', t: tObj.temp, v_current: dewObj.vapor, v_sat: tObj.vapor, t_dew: dewObj.temp }
                    };
                }
                generated.push(qObj);
            }
            return generated;
        }

        function initGame() {
            questions = generateQuestions(5);
            setupCanvasInteraction();
            loadQuestion();
            requestAnimationFrame(renderLoop);
            
            document.getElementById("answerInput").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    if(!document.getElementById("submitBtn").disabled) {
                        checkAnswer();
                    } else if (!document.getElementById("nextBtn").classList.contains("hidden")) {
                        nextQuestion();
                    }
                }
            });
        }

        function loadQuestion() {
            document.getElementById("stageIndicator").innerText = `Stage ${currentStage + 1} / ${questions.length}`;
            document.getElementById("questionText").innerText = questions[currentStage].q;
            document.getElementById("answerInput").value = "";
            document.getElementById("answerInput").disabled = false;
            document.getElementById("submitBtn").disabled = false;
            document.getElementById("hintBtn").disabled = false;
            document.getElementById("submitBtn").classList.remove("opacity-50", "cursor-not-allowed");
            document.getElementById("hintArea").classList.add("hidden");
            document.getElementById("feedbackArea").classList.add("hidden");
            document.getElementById("nextBtn").classList.add("hidden");
            document.getElementById("answerInput").focus();
            
            interactiveMode = true;
            showingFeedback = false;
            mousePos = null;
        }

        function showHint() {
            const hintArea = document.getElementById("hintArea");
            hintArea.classList.remove("hidden");
            hintArea.innerText = questions[currentStage].hint;
        }

        function checkAnswer() {
            const userAnswer = parseFloat(document.getElementById("answerInput").value);
            if (isNaN(userAnswer)) return;

            const correctAnswer = questions[currentStage].a;
            const feedbackArea = document.getElementById("feedbackArea");
            const feedbackTitle = document.getElementById("feedbackTitle");
            const feedbackDesc = document.getElementById("feedbackDesc");
            const nextBtn = document.getElementById("nextBtn");

            document.getElementById("answerInput").disabled = true;
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("hintBtn").disabled = true;
            document.getElementById("submitBtn").classList.add("opacity-50", "cursor-not-allowed");
            
            interactiveMode = false; // 정답 확인 시 인터랙션 중지
            mousePos = null;

            feedbackArea.classList.remove("hidden", "bg-red-50", "bg-green-50");
            feedbackTitle.classList.remove("text-red-700", "text-green-700");
            feedbackDesc.classList.remove("text-red-600", "text-green-600");
            nextBtn.classList.remove("hidden", "text-red-700", "border-red-300", "hover:bg-red-50", "text-green-700", "border-green-300", "hover:bg-green-50");

            if (userAnswer === correctAnswer) {
                feedbackArea.classList.add("bg-green-50");
                feedbackTitle.classList.add("text-green-700");
                feedbackDesc.classList.add("text-green-600");
                feedbackTitle.innerText = "정답입니다!";
                feedbackDesc.innerText = questions[currentStage].exp;
                nextBtn.innerText = currentStage === questions.length - 1 ? "결과 보기" : "다음 문제로";
                nextBtn.classList.add("text-green-700", "border-green-300", "hover:bg-green-50");

                // 애니메이션 시작
                animData = questions[currentStage].graph;
                animStartTime = null;
                showingFeedback = true;
            } else {
                feedbackArea.classList.add("bg-red-50");
                feedbackTitle.classList.add("text-red-700");
                feedbackDesc.classList.add("text-red-600");
                feedbackTitle.innerText = "오답입니다.";
                feedbackDesc.innerText = "계산을 다시 확인하거나, 힌트를 참고하여 그래프에 직접 점을 찍어보세요.";
                nextBtn.innerText = "다시 풀기";
                nextBtn.classList.add("text-red-700", "border-red-300", "hover:bg-red-50");
            }
        }

        function nextQuestion() {
            const nextBtn = document.getElementById("nextBtn");
            if (nextBtn.innerText === "다시 풀기") {
                document.getElementById("answerInput").value = "";
                document.getElementById("answerInput").disabled = false;
                document.getElementById("submitBtn").disabled = false;
                document.getElementById("hintBtn").disabled = false;
                document.getElementById("submitBtn").classList.remove("opacity-50", "cursor-not-allowed");
                document.getElementById("feedbackArea").classList.add("hidden");
                document.getElementById("nextBtn").classList.add("hidden");
                interactiveMode = true;
                document.getElementById("answerInput").focus();
            } else {
                currentStage++;
                if (currentStage >= questions.length) {
                    document.getElementById("quizArea").classList.add("hidden");
                    document.getElementById("gameEndScreen").classList.remove("hidden");
                    document.getElementById("stageIndicator").innerText = "Clear";
                    interactiveMode = false;
                    showingFeedback = false;
                } else {
                    loadQuestion();
                }
            }
        }

        function resetGame() {
            currentStage = 0;
            questions = generateQuestions(5);
            document.getElementById("quizArea").classList.remove("hidden");
            document.getElementById("gameEndScreen").classList.add("hidden");
            loadQuestion();
        }

        // --- 캔버스 렌더링 및 인터랙션 시스템 ---
        const canvasPadding = 40;
        const maxX = 35;
        const maxY = 30;

        function getX(t, w) { return canvasPadding + (t / maxX) * (w - canvasPadding * 2); }
        function getY(v, h) { return h - canvasPadding - (v / maxY) * (h - canvasPadding * 2); }
        function getT(x, w) { return ((x - canvasPadding) / (w - canvasPadding * 2)) * maxX; }
        function getV(y, h) { return ((h - canvasPadding - y) / (h - canvasPadding * 2)) * maxY; }

        function setupCanvasInteraction() {
            const canvas = document.getElementById("vaporGraph");
            
            canvas.addEventListener('mousemove', (e) => {
                if (!interactiveMode) return;
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                let t = getT(mouseX, canvas.width);
                let v = getV(mouseY, canvas.height);
                let snapped = false;

                // 스냅(Snap) 로직: 곡선 데이터와 가까우면 자석처럼 붙임
                vaporData.forEach(p => {
                    const px = getX(p.temp, canvas.width);
                    const py = getY(p.vapor, canvas.height);
                    if (Math.abs(mouseX - px) < 15 && Math.abs(mouseY - py) < 15) {
                        t = p.temp;
                        v = p.vapor;
                        snapped = true;
                    }
                });

                // 캔버스 범위를 벗어나지 않게 클램핑
                t = Math.max(0, Math.min(maxX, t));
                v = Math.max(0, Math.min(maxY, v));

                mousePos = { 
                    x: getX(t, canvas.width), 
                    y: getY(v, canvas.height), 
                    t: t.toFixed(1), 
                    v: v.toFixed(1), 
                    snapped 
                };
            });

            canvas.addEventListener('mouseleave', () => {
                mousePos = null;
            });
        }

        function renderLoop(timestamp) {
            const canvas = document.getElementById("vaporGraph");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            drawBaseGraph(ctx, width, height);

            if (showingFeedback && animData) {
                if (!animStartTime) animStartTime = timestamp;
                let progress = (timestamp - animStartTime) / animDuration;
                if (progress > 1) progress = 1;

                drawAnimation(ctx, animData, progress, width, height);
            } else if (interactiveMode && mousePos) {
                drawHoverCrosshair(ctx, width, height);
            }

            requestAnimationFrame(renderLoop);
        }

        function drawBaseGraph(ctx, width, height) {
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            ctx.beginPath();
            
            for (let i = 0; i <= maxX; i += 5) {
                const x = getX(i, width);
                ctx.moveTo(x, canvasPadding);
                ctx.lineTo(x, height - canvasPadding);
                ctx.fillStyle = "#64748b";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(i, x, height - canvasPadding + 15);
            }

            for (let i = 0; i <= maxY; i += 5) {
                const y = getY(i, height);
                ctx.moveTo(canvasPadding, y);
                ctx.lineTo(width - canvasPadding, y);
                ctx.fillStyle = "#64748b";
                ctx.font = "12px sans-serif";
                ctx.textAlign = "right";
                ctx.fillText(i, canvasPadding - 10, y + 4);
            }
            ctx.stroke();

            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvasPadding, canvasPadding);
            ctx.lineTo(canvasPadding, height - canvasPadding);
            ctx.lineTo(width - canvasPadding, height - canvasPadding);
            ctx.stroke();

            ctx.fillStyle = "#334155";
            ctx.font = "bold 12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("기온 (℃)", width / 2, height - 5);
            
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("수증기량 (g/kg)", 0, 0);
            ctx.restore();

            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 3;
            ctx.beginPath();
            vaporData.forEach((point, index) => {
                const x = getX(point.temp, width);
                const y = getY(point.vapor, height);
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.fillStyle = "#1e40af";
            vaporData.forEach(point => {
                const x = getX(point.temp, width);
                const y = getY(point.vapor, height);
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawHoverCrosshair(ctx, width, height) {
            ctx.strokeStyle = "#f59e0b";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 5]);

            ctx.beginPath();
            ctx.moveTo(mousePos.x, canvasPadding);
            ctx.lineTo(mousePos.x, height - canvasPadding);
            ctx.moveTo(canvasPadding, mousePos.y);
            ctx.lineTo(width - canvasPadding, mousePos.y);
            ctx.stroke();
            ctx.setLineDash([]); // 리셋

            // 값 표시 툴팁
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.strokeStyle = "#f59e0b";
            ctx.lineWidth = 1;
            
            const text = `기온: ${mousePos.t}℃, 수증기량: ${mousePos.v}g`;
            ctx.font = "12px sans-serif";
            const textWidth = ctx.measureText(text).width;
            
            let tx = mousePos.x + 10;
            let ty = mousePos.y - 20;
            
            // 화면 밖으로 넘어가지 않게 보정
            if (tx + textWidth + 10 > width) tx = mousePos.x - textWidth - 10;
            if (ty < canvasPadding) ty = mousePos.y + 20;

            ctx.fillRect(tx, ty - 14, textWidth + 10, 20);
            ctx.strokeRect(tx, ty - 14, textWidth + 10, 20);
            
            ctx.fillStyle = "#b45309";
            ctx.textAlign = "left";
            ctx.fillText(text, tx + 5, ty);
            
            // 포인트 하이라이트
            ctx.fillStyle = mousePos.snapped ? "#ef4444" : "#f59e0b";
            ctx.beginPath();
            ctx.arc(mousePos.x, mousePos.y, mousePos.snapped ? 6 : 4, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawAnimation(ctx, data, progress, width, height) {
            ctx.lineWidth = 2;
            ctx.font = "bold 12px sans-serif";
            ctx.setLineDash([]);

            if (data.type === 'point') {
                const x = getX(data.t, width);
                const y = getY(data.v, height);
                ctx.fillStyle = "#ef4444";
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.textAlign = "center";
                ctx.fillText(data.label, x, y - 12);
            }
            else if (data.type === 'dewPoint') {
                const startX = getX(data.t1, width);
                const y = getY(data.v, height);
                const targetX = getX(data.t2, width);
                const currentX = startX + (targetX - startX) * progress;

                drawArrow(ctx, startX, y, currentX, y, "#ef4444");
                
                ctx.fillStyle = "#ef4444";
                ctx.beginPath(); ctx.arc(startX, y, 4, 0, Math.PI*2); ctx.fill();
                
                if (progress === 1) {
                    ctx.beginPath(); ctx.arc(targetX, y, 6, 0, Math.PI*2); ctx.fill();
                    ctx.textAlign = "right";
                    ctx.fillText(`이슬점(${data.t2}℃)`, targetX - 10, y + 4);
                }
            }
            else if (data.type === 'condensation') {
                const startX = getX(data.t_start, width);
                const targetX = getX(data.t_end, width);
                const startY = getY(data.v_start, height);
                const targetY = getY(data.v_end, height);

                ctx.fillStyle = "#ef4444";
                ctx.beginPath(); ctx.arc(startX, startY, 4, 0, Math.PI*2); ctx.fill();

                if (progress < 0.5) {
                    const p = progress * 2;
                    const currentX = startX + (targetX - startX) * p;
                    drawArrow(ctx, startX, startY, currentX, startY, "#ef4444");
                } else {
                    drawArrow(ctx, startX, startY, targetX, startY, "#ef4444");
                    const p = (progress - 0.5) * 2;
                    const currentY = startY + (targetY - startY) * p;
                    drawArrow(ctx, targetX, startY, targetX, currentY, "#ef4444");
                }

                if (progress === 1) {
                    ctx.beginPath(); ctx.arc(targetX, targetY, 6, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#ef4444";
                    ctx.textAlign = "left";
                    ctx.fillText(`응결량`, targetX + 10, startY + (targetY - startY)/2 + 4);
                }
            }
            else if (data.type === 'humidity') {
                const x = getX(data.t, width);
                const baseY = getY(0, height);
                const currentY = getY(data.v_current, height);
                const satY = getY(data.v_sat, height);

                if(data.t_dew) {
                    const dewX = getX(data.t_dew, width);
                    drawArrow(ctx, x, currentY, dewX, currentY, "#94a3b8");
                    ctx.fillStyle = "#64748b";
                    ctx.textAlign = "right";
                    ctx.fillText(`이슬점`, dewX - 5, currentY + 4);
                }

                const animCurrentY = baseY + (currentY - baseY) * progress;
                const animSatY = baseY + (satY - baseY) * progress;

                ctx.fillStyle = "rgba(59, 130, 246, 0.2)";
                ctx.fillRect(x - 12, animSatY, 24, baseY - animSatY);
                ctx.strokeStyle = "#3b82f6";
                ctx.strokeRect(x - 12, animSatY, 24, baseY - animSatY);

                ctx.fillStyle = "rgba(239, 68, 68, 0.5)";
                ctx.fillRect(x - 12, animCurrentY, 24, baseY - animCurrentY);
                ctx.strokeStyle = "#ef4444";
                ctx.strokeRect(x - 12, animCurrentY, 24, baseY - animCurrentY);

                if (progress === 1) {
                    ctx.fillStyle = "#1e40af";
                    ctx.textAlign = "left";
                    ctx.fillText(`포화: ${data.v_sat}g`, x + 18, satY + 10);
                    ctx.fillStyle = "#b91c1c";
                    ctx.fillText(`현재: ${data.v_current}g`, x + 18, currentY + 10);
                }
            }
        }

        function drawArrow(ctx, fromX, fromY, toX, toY, color) {
            if (fromX === toX && fromY === toY) return;
            const headlen = 8;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        window.onload = initGame;
    </script>
</body>
</html>
